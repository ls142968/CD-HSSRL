joint_state_controller:
  type: "joint_state_controller/JointStateController"
  publish_rate: 50

robot_state_controller:
  type: "robot_state_controller/RobotStateController"


# 控制器配置文件 (例如 controllers.yaml)
skid_steer_controller:
  type: "skid_steer_controller/SkidSteerDriveController"
  left_wheel: ["zhu1_joint", "c12_joint", "c15_joint"]
  right_wheel: ["zhu2_joint", "c22_joint", "c25_joint"]
  wheel_separation: 0.302
  wheel_diameter: 0.1
  cmd_vel_timeout: 0.5
  odom_frame: "odom"
  base_frame: "base_link"

